name: Dependency Review

on:
  pull_request:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base ref or commit SHA to compare from during manual validation
        required: true
      head_ref:
        description: Head ref or commit SHA to compare to during manual validation
        required: true

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Report dependency review availability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          repo_json="$(gh api "repos/$REPO")"
          visibility="$(printf '%s' "$repo_json" | jq -r '.visibility')"

          {
            echo '## Dependency Review Status'
            echo
            if [ "$visibility" = "private" ]; then
              echo 'Dependency review is intentionally disabled in this workflow for the current private repository state.'
              echo
              echo 'GitHub requires additional repository security features for dependency review on this repo, and the previous action path also emitted a deprecated Node 20 runtime warning.'
              echo
              echo 'Tracked follow-up: issue #20'
            else
              echo 'Repository is not private anymore. Revisit issue #20 to replace this placeholder with a full dependency-review implementation that fits the new repository posture.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
