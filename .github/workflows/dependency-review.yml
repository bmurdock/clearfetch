name: Dependency Review

on:
  pull_request:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base ref or commit SHA to compare from during manual validation
        required: true
      head_ref:
        description: Head ref or commit SHA to compare to during manual validation
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          base-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.base_ref || '' }}
          head-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.head_ref || '' }}
